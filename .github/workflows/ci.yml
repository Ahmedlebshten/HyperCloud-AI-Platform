name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest  
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: ./app
        run: npm install

      - name: Run Unit Tests
        working-directory: ./app
        run: npm test || echo "No tests defined, skipping..."

      - name: Build Docker Image
        working-directory: ./app
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/guestbook:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/guestbook:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/guestbook:latest

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/guestbook:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Docker Hub Login and Push
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push ${{ secrets.DOCKER_USERNAME }}/guestbook:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/guestbook:latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            kubectl set image deployment/guestbook-app guestbook=${{ secrets.DOCKER_USERNAME }}/guestbook:${{ github.sha }}
            kubectl rollout status deployment/guestbook-app